name: build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@master
      with:
        submodules: recursive

    - name: Build
      run: make dist -j2

    - uses: actions/upload-artifact@master
      with:
        name: sys-patch
        path: sys-patch.zip
